<!DOCTYPE html>
<html lang="ru">
<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>

            <li>За семью, наполненную теплом!</li>
        </ul>
    </section>

    <section class="registration-section">
        <h2 class="section-title">Также в этот день отмечают 🎉</h2>

    </section>

    <footer class="footer">
