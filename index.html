<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение на свадьбу</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="container">

<!-- HERO -->
<header class="header">
    <div class="header-content">
        <h1 class="names">
            <span>Ирина</span>
            <span class="ampersand">&</span>
            <span>Вячеслав</span>
        </h1>
        <p class="subtitle">приглашают вас на свою свадьбу</p>
    </div>
</header>

<!-- ИНФО -->
<section class="info-section">
    <a href="data.html" class="info-card">
        <h3>Дата</h3>
        <p>06.06.2026</p>
        <p>Начало в 18:00</p>
    </a>

    <a href="place.html" class="info-card">
        <h3>Место</h3>
        <p>ул. 1 мая, 17</p>
        <p>село Кременкуль</p>
    </a>

    <a href="dresscode.html" class="info-card">
        <h3>Дресс-код</h3>
        <p>Цвет: Бордо</p>
        <p>В бордовых оттенках приветствуются</p>
    </a>
</section>

<!-- ФОРМА -->
<section class="registration-section">
    <h2 class="section-title">Подтвердите участие</h2>

    <div class="registration-type">
        <div class="type-option" id="individualOption" onclick="selectType('individual')">
            <i class="fas fa-user"></i> Индивидуально
        </div>
        <div class="type-option" id="pairOption" onclick="selectType('pair')">
            <i class="fas fa-users"></i> Парой
        </div>
    </div>

    <form id="registrationForm">
        <label>Ваше имя *</label>
        <input type="text" id="firstName" required>

        <div id="secondPersonGroup" style="display:none;">
            <label>Имя второй персоны *</label>
            <input type="text" id="secondName">
        </div>

        <label>Телефон</label>
        <input type="tel" id="phone">

        <label>Пожелания</label>
        <input type="text" id="messageText">

        <button type="submit" class="submit-btn">
            Подтвердить участие
        </button>
    </form>
</section>

<footer>
    <p>С любовью, Ирина и Вячеслав ❤️</p>
</footer>

</div>
<script src="script.js"></script>
</body>
</html>
